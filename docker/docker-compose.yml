services:
  cucm-exporter:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cucm-exporter
    ports:
      - "9100:9100"
    environment:
      - LOG_LEVEL=INFO
      # Multi-server: configure servers in exporter_config.yaml (mounted below).
      # Single-server fallback via env vars still works:
      #   CUCM_HOST=192.168.1.20
      #   CUCM_USERNAME=administrator
      #   CUCM_PASSWORD=password
    volumes:
      - ../config/exporter_config.yaml:/app/config/exporter_config.yaml:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
